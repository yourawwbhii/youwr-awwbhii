<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Question For You</title>

<style>
body{
    background:#ffe6f0;
    font-family:Arial, sans-serif;
    text-align:center;
    margin-top:120px;
}

h1{
    font-size:38px;
    color:#ff3366;
}

button{
    padding:12px 25px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#888;
    color:white;
}
</style>
</head>

<body>

<h1 id="question">Will you be my friend? 😊</h1>

<button id="yes">Yes 😊</button>
<button id="no">No 😅</button>

<script>

const questions = [
"Are you sure? 🤔",
"Maybe think again? 😊",
"Friendship could be fun! 😄",
"I promise I'm a good friend! 🙂",
"Last chance... will you be my friend? 🥺"
];

let index = 0;

document.getElementById("no").onclick = function(){

    if(index < questions.length){
        document.getElementById("question").innerText = questions[index];
        index++;
    } else {
        document.getElementById("question").innerText =
        "Okay... I still hope we can be friends someday 🙂";
    }

}

document.getElementById("yes").onclick = function(){
    document.body.innerHTML =
    "<h1>Yay! 🎉</h1><p>I'm really happy you said yes! 😊</p>";
}

</script>

</body>
</html>
